<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projection Wall</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #000000;
      --border: #1e1e1e;
      --accent: #c8f060;
      --muted:  #444;
      --font:   'Space Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #e8e8e0;
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── WALL (flex rows, so partial last row stretches to fill) ── */
    #wall {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px;
    }

    .wall-row {
      display: flex;
      flex: 1 1 0;
      min-height: 0;
      gap: 4px;
    }

    /* Each cell holds one projection image */
    .proj-cell {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .proj-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── PER-IMAGE DOWNLOAD BUTTON ──────────────── */
    .cell-download {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--muted);
      border-radius: 4px;
      color: #e8e8e0;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    }
    .proj-cell:hover .cell-download { opacity: 1; }
    .cell-download:hover { color: var(--accent); border-color: var(--accent); }

    /* ── EMPTY STATE ────────────────────────────── */
    #empty {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
    }
    #empty svg { opacity: 0.2; }
    #empty.hidden { display: none; }

    /* ── BOTTOM CONTROLS ────────────────────────── */
    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    body:hover #controls { opacity: 1; }

    #controls button {
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--muted);
      border-radius: 4px;
      font-family: var(--font);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #save-btn:hover { color: var(--accent); border-color: var(--accent); }
    #clear-btn:hover { color: #e55; border-color: #e55; }

    /* ── LIVE INDICATOR ─────────────────────────── */
    #live-dot {
      position: fixed;
      top: 14px;
      right: 16px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    #live-dot.pulse {
      background: var(--accent);
      animation: pulse 1s ease-out forwards;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(200,240,96,0.7); }
      70%  { box-shadow: 0 0 0 10px rgba(200,240,96,0); }
      100% { box-shadow: 0 0 0 0 rgba(200,240,96,0); background: var(--muted); }
    }
  </style>
</head>
<body>

<div id="wall"></div>

<div id="empty">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <path d="M3 9h18M9 21V9"/>
  </svg>
  Waiting for photos…
</div>

<div id="live-dot"></div>

<div id="controls">
  <button id="save-btn">Last ned alle</button>
  <button id="clear-btn">Clear wall</button>
</div>

<script>
const STORAGE_KEY  = 'photobooth-wall-snapshots';
const CHANNEL_NAME = 'photobooth-wall';

const wall     = document.getElementById('wall');
const empty    = document.getElementById('empty');
const liveDot  = document.getElementById('live-dot');
const clearBtn = document.getElementById('clear-btn');
const saveBtn  = document.getElementById('save-btn');

const PROJ_KEYS  = ['mercator', 'peters', 'robinson', 'goode'];
const MAX_IMAGES = 640;

// ── GRID LAYOUT ────────────────────────────────── 
// We only need to decide how many cells go in each row.
// Rows are built as flex containers, so a partial last row
// automatically stretches its cells to fill the full width,
// and rows themselves share the height equally.
function computeCols(n) {
  if (n === 0) return 4;
  const aspect = window.innerWidth / window.innerHeight;
  const cols = Math.max(3, Math.round(Math.sqrt(n * aspect)));
  return Math.max(cols, 1);
}

// ── STORAGE ──────────────────────────────────────
// Store flat list of { id, key, src } — one entry per projection image

function loadCells() {
  try {
    const cells = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return cells.filter(c => c.src && c.src !== 'undefined');
  }
  catch { return []; }
}

function saveCells(cells) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cells));
  } catch {
    // full — trim oldest quarter and retry
    const trimmed = cells.slice(Math.floor(cells.length / 4));
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed)); } catch {}
  }
}

// ── SHUFFLE helper ───────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── DOWNLOAD helpers ──────────────────────────────
function downloadCell(cell) {
  const match = /^data:image\/(\w+);/.exec(cell.src);
  const ext = match ? match[1] : 'png';
  const a = document.createElement('a');
  a.href = cell.src;
  a.download = `${cell.key}-${cell.id}.${ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function downloadAll() {
  const cells = loadCells();
  if (cells.length === 0) return;
  // Trigger downloads one at a time with a tiny delay so the
  // browser doesn't block them as a popup/download flood.
  for (const cell of cells) {
    downloadCell(cell);
    await new Promise(r => setTimeout(r, 150));
  }
}

// ── RENDER ───────────────────────────────────────
function makeCell(cell, delay = 0) {
  const div = document.createElement('div');
  div.className = 'proj-cell';
  div.dataset.id  = cell.id;
  div.dataset.key = cell.key;
  div.style.animationDelay = delay + 's';

  const img = document.createElement('img');
  img.className = 'proj-img';
  img.src = cell.src;
  img.alt = cell.key;
  div.appendChild(img);

  const dl = document.createElement('button');
  dl.className = 'cell-download';
  dl.title = 'Last ned bilde';
  dl.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/>
    </svg>`;
  dl.addEventListener('click', (e) => {
    e.stopPropagation();
    downloadCell(cell);
  });
  div.appendChild(dl);

  return div;
}

function renderAll(cells) {
  wall.innerHTML = '';
  const cols = computeCols(cells.length);

  for (let i = 0; i < cells.length; i += cols) {
    const rowCells = cells.slice(i, i + cols);
    const rowDiv = document.createElement('div');
    rowDiv.className = 'wall-row';
    rowCells.forEach((cell, idx) => {
      rowDiv.appendChild(makeCell(cell, (i + idx) * 0.04));
    });
    wall.appendChild(rowDiv);
  }

  empty.classList.toggle('hidden', cells.length > 0);
}

// ── ADD NEW SNAPSHOT ─────────────────────────────
// Break the 4 projections into individual cells and insert them
// at shuffled positions among existing cells so they spread out.

function addSnapshot(snap) {
  const cells = loadCells();

  // Avoid duplicates
  if (cells.some(c => c.id === snap.id && c.key === PROJ_KEYS[0])) return;

  const newCells = shuffle([...PROJ_KEYS])
    .map(key => ({ id: snap.id, key, src: snap.images[key] }))
    .filter(c => c.src);

  // Insert them at spread-out positions rather than all at the front
  const step = Math.max(1, Math.floor((cells.length + 4) / 4));
  newCells.forEach((cell, i) => {
    const pos = Math.min(i * step, cells.length);
    cells.splice(pos, 0, cell);
  });

  // Cap total
  while (cells.length > MAX_IMAGES) cells.pop();

  saveCells(cells);
  renderAll(cells);

  // Flash live indicator
  liveDot.classList.remove('pulse');
  void liveDot.offsetWidth;
  liveDot.classList.add('pulse');
  liveDot.addEventListener('animationend', () => liveDot.classList.remove('pulse'), { once: true });
}

// ── BROADCAST CHANNEL ────────────────────────────
const channel = new BroadcastChannel(CHANNEL_NAME);

channel.addEventListener('message', e => {
  const data = e.data;
  if (data?.type === 'new-photo' || data?.type === 'snapshot') {
    addSnapshot({ id: data.id ?? data.timestamp ?? Date.now(), images: data.images });
  }
});

// ── CLEAR ────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  if (!confirm('Clear all photos from the wall?')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderAll([]);
});

// ── SAVE ALL ──────────────────────────────────────
saveBtn.addEventListener('click', () => {
  downloadAll();
});

// ── INIT ─────────────────────────────────────────
renderAll(loadCells());

window.addEventListener('resize', () => {
  renderAll(loadCells());
});
</script>

</body>
</html>
