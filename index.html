<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photobooth Wall</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono&display=swap');

  :root {
    --bg: #0e0e0e;
    --accent: #c8f060;
    --text: #e8e8e0;
  }

  body {
    margin: 0;
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  /* GRID WALL */
  #wall {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    padding: 12px;
  }

  .photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #2e2e2e;
    box-shadow: 0 0 12px rgba(0,0,0,0.5);
    opacity: 0;
    transform: scale(0.95);
    animation: pop 300ms ease-out forwards;
  }

  @keyframes pop {
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* optional header */
  #status {
    position: fixed;
    bottom: 10px;
    left: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(200,240,96,0.6);
    z-index: 10;
  }

  /* subtle scanline vibe (optional cool for projection) */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 1px,
      transparent 2px,
      transparent 4px
    );
    opacity: 0.2;
  }
</style>
</head>

<body>

<div id="wall"></div>
<div id="status">waiting for photobooth…</div>

<script>
const channel = new BroadcastChannel("photobooth-wall");
const wall = document.getElementById("wall");
const status = document.getElementById("status");

channel.onmessage = (event) => {
  const data = event.data;

  if (data.type !== "projections") return;

  addSet(data.images);
  status.textContent = "live feed active";
  const saved = localStorage.getItem("lastProjections"); 
  if (saved) {
  const payload = JSON.parse(saved);
  addSet(payload.images);
}
};

function addSet(images) {
  const container = document.createElement("div");
  container.style.display = "grid";
  container.style.gridTemplateColumns = "1fr 1fr";
  container.style.gap = "6px";
  container.style.marginBottom = "12px";

  Object.values(images).forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.style.width = "100%";
    img.style.borderRadius = "6px";
    container.appendChild(img);
  });

  wall.prepend(container);
}
</script>
</body>
</html>
