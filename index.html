<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projection Wall</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #000000;
      --border: #1e1e1e;
      --accent: #c8f060;
      --muted:  #444;
      --font:   'Space Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #e8e8e0;
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── WALL GRID ─────────────────────────────── */
    #wall {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      grid-template-rows: repeat(var(--rows), 1fr);
      gap: 4px;
      padding: 4px;
    }

    /* Each cell holds one projection image */
    .proj-cell {
      width: 100%;
      height: 100%;
      overflow: hidden;
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .proj-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── EMPTY STATE ────────────────────────────── */
    #empty {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
    }
    #empty svg { opacity: 0.2; }
    #empty.hidden { display: none; }

    /* ── CLEAR BUTTON ───────────────────────────── */
    #clear-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--muted);
      border-radius: 4px;
      font-family: var(--font);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, border-color 0.2s;
    }
    #clear-btn:hover { color: #e55; border-color: #e55; }
    body:hover #clear-btn { opacity: 1; }

    /* ── LIVE INDICATOR ─────────────────────────── */
    #live-dot {
      position: fixed;
      top: 14px;
      right: 16px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    #live-dot.pulse {
      background: var(--accent);
      animation: pulse 1s ease-out forwards;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(200,240,96,0.7); }
      70%  { box-shadow: 0 0 0 10px rgba(200,240,96,0); }
      100% { box-shadow: 0 0 0 0 rgba(200,240,96,0); background: var(--muted); }
    }
  </style>
</head>
<body>

<div id="wall"></div>

<div id="empty">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <path d="M3 9h18M9 21V9"/>
  </svg>
  Waiting for photos…
</div>

<div id="live-dot"></div>

<button id="clear-btn">Clear wall</button>

<script>
const STORAGE_KEY  = 'photobooth-wall-snapshots';
const CHANNEL_NAME = 'photobooth-wall';

const wall    = document.getElementById('wall');
const empty   = document.getElementById('empty');
const liveDot = document.getElementById('live-dot');
const clearBtn = document.getElementById('clear-btn');

const PROJ_KEYS  = ['mercator', 'peters', 'robinson', 'goode'];
const MAX_IMAGES = 120;

// ── GRID LAYOUT ────────────────────────────────── // We keep a flat list of placed cells (each = one projection image). // Grid dimensions are calculated to keep cells roughly square-ish. function computeGrid(n) { if (n === 0) return { cols: 4, rows: 3 }; const aspect = window.innerWidth / window.innerHeight; const cols = Math.max(3, Math.round(Math.sqrt(n * aspect))); const rows = Math.ceil(n / cols); return { cols: Math.max(cols, 1), rows: Math.max(rows, 1) }; } function applyGrid(cols, rows) { wall.style.setProperty('--cols', cols); wall.style.setProperty('--rows', rows); }

function applyGrid(cols, rows) {
  wall.style.setProperty('--cols', cols);
  wall.style.setProperty('--rows', rows);
}

// ── STORAGE ──────────────────────────────────────
// Store flat list of { id, key, src } — one entry per projection image

function loadCells() {
  try {
    const cells = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return cells.filter(c => c.src && c.src !== 'undefined');
  }
  catch { return []; }
}

function saveCells(cells) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cells));
  } catch {
    // full — trim oldest quarter and retry
    const trimmed = cells.slice(Math.floor(cells.length / 4));
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed)); } catch {}
  }
}

// ── SHUFFLE helper ───────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── RENDER ───────────────────────────────────────
function makeCell(cell, delay = 0) {
  const div = document.createElement('div');
  div.className = 'proj-cell';
  div.dataset.id  = cell.id;
  div.dataset.key = cell.key;
  div.style.animationDelay = delay + 's';

  const img = document.createElement('img');
  img.className = 'proj-img';
  img.src = cell.src;
  img.alt = cell.key;
  div.appendChild(img);
  return div;
}

function renderAll(cells) {
  wall.innerHTML = '';
  const { cols, rows } = computeGrid(cells.length);
  applyGrid(cols, rows);

  cells.forEach((cell, i) => {
    wall.appendChild(makeCell(cell, i * 0.04));
  });

  empty.classList.toggle('hidden', cells.length > 0);
}

// ── ADD NEW SNAPSHOT ─────────────────────────────
// Break the 4 projections into individual cells and insert them
// at shuffled positions among existing cells so they spread out.

function addSnapshot(snap) {
  const cells = loadCells();

  // Avoid duplicates
  if (cells.some(c => c.id === snap.id && c.key === PROJ_KEYS[0])) return;

  const newCells = shuffle([...PROJ_KEYS])
    .map(key => ({ id: snap.id, key, src: snap.images[key] }))
    .filter(c => c.src);

  // Insert them at spread-out positions rather than all at the front
  const step = Math.max(1, Math.floor((cells.length + 4) / 4));
  newCells.forEach((cell, i) => {
    const pos = Math.min(i * step, cells.length);
    cells.splice(pos, 0, cell);
  });

  // Cap total
  while (cells.length > MAX_IMAGES) cells.pop();

  saveCells(cells);
  renderAll(cells);

  // Flash live indicator
  liveDot.classList.remove('pulse');
  void liveDot.offsetWidth;
  liveDot.classList.add('pulse');
  liveDot.addEventListener('animationend', () => liveDot.classList.remove('pulse'), { once: true });
}

// ── BROADCAST CHANNEL ────────────────────────────
const channel = new BroadcastChannel(CHANNEL_NAME);

channel.addEventListener('message', e => {
  const data = e.data;
  if (data?.type === 'new-photo' || data?.type === 'snapshot') {
    addSnapshot({ id: data.id ?? data.timestamp ?? Date.now(), images: data.images });
  }
});

// ── CLEAR ────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  if (!confirm('Clear all photos from the wall?')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderAll([]);
});

// ── INIT ─────────────────────────────────────────
renderAll(loadCells());

window.addEventListener('resize', () => {
  const cells = loadCells();
  const { cols, rows } = computeGrid(cells.length);
  applyGrid(cols, rows);
});
</script>

</body>
</html>
