<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projection Wall</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #000000;
      --border: #1e1e1e;
      --accent: #c8f060;
      --muted:  #444;
      --font:   'Space Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #e8e8e0;
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── WALL (flex rows, so partial last row stretches to fill) ── */
    #wall {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px;
    }

    .wall-row {
      display: flex;
      flex: 1 1 0;
      min-height: 0;
      gap: 4px;
    }

    /* Each cell holds one projection image */
    .proj-cell {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .proj-img {
      width: 100%;
      height: 100%;
      /* cover (not contain) so every cell is filled edge-to-edge,
         no letterbox gaps — the whole 1280x800 wall stays covered */
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── PER-IMAGE DOWNLOAD BUTTON ──────────────── */
    .cell-download {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--muted);
      border-radius: 4px;
      color: #e8e8e0;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    }
    .proj-cell:hover .cell-download { opacity: 1; }
    .cell-download:hover { color: var(--accent); border-color: var(--accent); }

    /* ── EMPTY STATE ────────────────────────────── */
    #empty {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
    }
    #empty svg { opacity: 0.2; }
    #empty.hidden { display: none; }

    /* ── BOTTOM CONTROLS ────────────────────────── */
    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    body:hover #controls { opacity: 1; }

    #controls button {
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--muted);
      border-radius: 4px;
      font-family: var(--font);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #save-btn:hover { color: var(--accent); border-color: var(--accent); }
    #folder-btn:hover { color: var(--accent); border-color: var(--accent); }
    #clear-btn:hover { color: #e55; border-color: #e55; }

    #save-status {
      font-family: var(--font);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 4px;
    }
    #save-status.on { color: var(--accent); }

    /* ── LIVE INDICATOR ─────────────────────────── */
    #live-dot {
      position: fixed;
      top: 14px;
      right: 16px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    #live-dot.pulse {
      background: var(--accent);
      animation: pulse 1s ease-out forwards;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(200,240,96,0.7); }
      70%  { box-shadow: 0 0 0 10px rgba(200,240,96,0); }
      100% { box-shadow: 0 0 0 0 rgba(200,240,96,0); background: var(--muted); }
    }
  </style>
</head>
<body>

<div id="wall"></div>

<div id="empty">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <path d="M3 9h18M9 21V9"/>
  </svg>
  Waiting for photos…
</div>

<div id="live-dot"></div>

<div id="controls">
  <span id="save-status">Auto-lagring: av</span>
  <button id="folder-btn">Velg lagringsmappe</button>
  <button id="save-btn">Last ned alle</button>
  <button id="clear-btn">Clear wall</button>
</div>

<script>
const STORAGE_KEY  = 'photobooth-wall-snapshots';
const CHANNEL_NAME = 'photobooth-wall';

const wall       = document.getElementById('wall');
const empty      = document.getElementById('empty');
const liveDot    = document.getElementById('live-dot');
const clearBtn   = document.getElementById('clear-btn');
const saveBtn    = document.getElementById('save-btn');
const folderBtn  = document.getElementById('folder-btn');
const saveStatus = document.getElementById('save-status');

const PROJ_KEYS  = ['mercator', 'peters', 'robinson', 'goode'];
const MAX_IMAGES = 640;

// ── GRID LAYOUT ────────────────────────────────── 
// We only need to decide how many cells go in each row.
// Rows are built as flex containers, so a partial last row
// automatically stretches its cells to fill the full width,
// and rows themselves share the height equally. Combined with
// object-fit:cover on each image, every cell — including a
// partial last row — is fully covered edge-to-edge, so the
// whole 1280x800 wall stays filled with no gaps.
function computeCols(n) {
  if (n === 0) return 4;
  const aspect = window.innerWidth / window.innerHeight; // ~1.6 on the 1280x800 projector
  const cols = Math.max(3, Math.round(Math.sqrt(n * aspect)));
  return Math.max(cols, 1);
}

// ── STORAGE (wall state, shown via BroadcastChannel) ─────────
// Store flat list of { id, key, src } — one entry per projection image

function loadCells() {
  try {
    const cells = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return cells.filter(c => c.src && c.src !== 'undefined');
  }
  catch { return []; }
}

function saveCells(cells) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cells));
  } catch {
    // full — trim oldest quarter and retry
    const trimmed = cells.slice(Math.floor(cells.length / 4));
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed)); } catch {}
  }
}

// ── SHUFFLE helper ───────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── MANUAL DOWNLOAD helpers (fallback / "Last ned alle") ────
function downloadCell(cell) {
  const match = /^data:image\/(\w+);/.exec(cell.src);
  const ext = match ? match[1] : 'png';
  const a = document.createElement('a');
  a.href = cell.src;
  a.download = `${cell.key}-${cell.id}.${ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function downloadAll() {
  const cells = loadCells();
  if (cells.length === 0) return;
  for (const cell of cells) {
    downloadCell(cell);
    await new Promise(r => setTimeout(r, 150));
  }
}

// ── AUTO-SAVE TO DISK (File System Access API) ───────────────
// Lets the wall write every incoming photo straight to a folder
// on the iMac's disk, with no per-photo click needed. The user
// picks the folder once (browser gesture required); the handle
// is remembered in IndexedDB so it survives page reloads.
// Supported in Chrome/Edge on the Mac. Safari does not support
// this API yet — see the fallback further down.

const DB_NAME = 'wall-fs-db';
const STORE_NAME = 'handles';

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(STORE_NAME);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const r = tx.objectStore(STORE_NAME).get(key);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

let dirHandle = null;
let autoSaveEnabled = false;
const savedFileNames = new Set(); // avoid re-writing the same photo repeatedly

function updateSaveStatus() {
  if (autoSaveEnabled) {
    saveStatus.textContent = 'Auto-lagring: på';
    saveStatus.classList.add('on');
  } else {
    saveStatus.textContent = 'Auto-lagring: av';
    saveStatus.classList.remove('on');
  }
}

async function verifyPermission(handle, readWrite = true) {
  const opts = readWrite ? { mode: 'readwrite' } : {};
  if ((await handle.queryPermission(opts)) === 'granted') return true;
  if ((await handle.requestPermission(opts)) === 'granted') return true;
  return false;
}

async function saveCellToDisk(cell) {
  if (!dirHandle || !autoSaveEnabled) return;
  const match = /^data:image\/(\w+);base64,(.*)$/.exec(cell.src);
  if (!match) return;
  const ext = match[1];
  const fileName = `${cell.key}-${cell.id}.${ext}`;
  if (savedFileNames.has(fileName)) return;
  try {
    const base64 = match[2];
    const bin = atob(base64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(bytes);
    await writable.close();
    savedFileNames.add(fileName);
  } catch (err) {
    console.error('Auto-save to disk failed:', err);
  }
}

async function saveAllToDisk() {
  if (!dirHandle || !autoSaveEnabled) return;
  for (const cell of loadCells()) {
    await saveCellToDisk(cell);
  }
}

async function chooseFolder() {
  if (!window.showDirectoryPicker) {
    alert('Denne nettleseren støtter ikke automatisk lagring til mappe (kun Chrome/Edge). Bruk "Last ned alle" i stedet, eller åpne siden i Chrome.');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker();
    if (await verifyPermission(handle)) {
      dirHandle = handle;
      autoSaveEnabled = true;
      await idbSet('dirHandle', handle);
      updateSaveStatus();
      await saveAllToDisk(); // catch up on photos already on the wall
    }
  } catch (err) {
    // user cancelled the picker — ignore
  }
}

async function tryRestoreFolder() {
  if (!window.showDirectoryPicker) return;
  try {
    const handle = await idbGet('dirHandle');
    if (handle && await verifyPermission(handle)) {
      dirHandle = handle;
      autoSaveEnabled = true;
      updateSaveStatus();
    }
  } catch {
    // no stored handle, or permission not (yet) granted — user can click "Velg lagringsmappe"
  }
}

folderBtn.addEventListener('click', chooseFolder);

// ── RENDER ───────────────────────────────────────
function makeCell(cell, delay = 0) {
  const div = document.createElement('div');
  div.className = 'proj-cell';
  div.dataset.id  = cell.id;
  div.dataset.key = cell.key;
  div.style.animationDelay = delay + 's';

  const img = document.createElement('img');
  img.className = 'proj-img';
  img.src = cell.src;
  img.alt = cell.key;
  div.appendChild(img);

  const dl = document.createElement('button');
  dl.className = 'cell-download';
  dl.title = 'Last ned bilde';
  dl.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/>
    </svg>`;
  dl.addEventListener('click', (e) => {
    e.stopPropagation();
    downloadCell(cell);
  });
  div.appendChild(dl);

  return div;
}

function renderAll(cells) {
  wall.innerHTML = '';
  const cols = computeCols(cells.length);

  for (let i = 0; i < cells.length; i += cols) {
    const rowCells = cells.slice(i, i + cols);
    const rowDiv = document.createElement('div');
    rowDiv.className = 'wall-row';
    rowCells.forEach((cell, idx) => {
      rowDiv.appendChild(makeCell(cell, (i + idx) * 0.04));
    });
    wall.appendChild(rowDiv);
  }

  empty.classList.toggle('hidden', cells.length > 0);
}

// ── ADD NEW SNAPSHOT ─────────────────────────────
// Break the 4 projections into individual cells and insert them
// at shuffled positions among existing cells so they spread out.

function addSnapshot(snap) {
  const cells = loadCells();

  // Avoid duplicates
  if (cells.some(c => c.id === snap.id && c.key === PROJ_KEYS[0])) return;

  const newCells = shuffle([...PROJ_KEYS])
    .map(key => ({ id: snap.id, key, src: snap.images[key] }))
    .filter(c => c.src);

  // Insert them at spread-out positions rather than all at the front
  const step = Math.max(1, Math.floor((cells.length + 4) / 4));
  newCells.forEach((cell, i) => {
    const pos = Math.min(i * step, cells.length);
    cells.splice(pos, 0, cell);
  });

  // Cap total
  while (cells.length > MAX_IMAGES) cells.pop();

  saveCells(cells);
  renderAll(cells);

  // Write the new photos straight to disk, if a folder was chosen
  newCells.forEach(cell => saveCellToDisk(cell));

  // Flash live indicator
  liveDot.classList.remove('pulse');
  void liveDot.offsetWidth;
  liveDot.classList.add('pulse');
  liveDot.addEventListener('animationend', () => liveDot.classList.remove('pulse'), { once: true });
}

// ── BROADCAST CHANNEL ────────────────────────────
const channel = new BroadcastChannel(CHANNEL_NAME);

channel.addEventListener('message', e => {
  const data = e.data;
  if (data?.type === 'new-photo' || data?.type === 'snapshot') {
    addSnapshot({ id: data.id ?? data.timestamp ?? Date.now(), images: data.images });
  }
});

// ── CLEAR ────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  if (!confirm('Clear all photos from the wall?')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderAll([]);
});

// ── SAVE ALL (manual downloads, fallback) ─────────
saveBtn.addEventListener('click', () => {
  downloadAll();
});

// ── INIT ─────────────────────────────────────────
renderAll(loadCells());
tryRestoreFolder();

window.addEventListener('resize', () => {
  renderAll(loadCells());
});
</script>

</body>
</html>
